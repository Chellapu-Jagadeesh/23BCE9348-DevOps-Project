cat > nagios-config/tourism.cfg << 'EOF'
# ============================================
# Tourism Website Host & Services
# ============================================

define host {
    use                     linux-server
    host_name               tourism-website
    alias                   Tourism Website Application
    address                 host.docker.internal    # Reaches back to host
    max_check_attempts      3
    check_period            24x7
    notification_period     24x7
    check_command           check-host-alive
    contact_groups          admins
}

define service {
    use                     generic-service
    host_name               tourism-website
    service_description     HTTP - Website
    check_command           check_http!-H host.docker.internal -p 80081 -u / -e 200
    max_check_attempts      3
    check_interval          5
    retry_interval          1
    notification_options    w,u,c,r
}

define service {
    use                     generic-service
    host_name               tourism-website
    service_description     HTTP - Health Check
    check_command           check_http!-H host.docker.internal -p 30081 -u /health -s "UP"
    max_check_attempts      3
    check_interval          5
    retry_interval          1
    notification_options    w,u,c,r
}

define service {
    use                     generic-service
    host_name               tourism-website
    service_description     TCP - Port 80081
    check_command           check_tcp!80081
    max_check_attempts      3
    check_interval          5
    retry_interval          1
    notification_options    w,u,c,r
}
EOF