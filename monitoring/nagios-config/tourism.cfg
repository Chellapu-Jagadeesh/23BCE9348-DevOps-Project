define host {
use                     linux-server
    host_name               tourism-website

    alias                   Tourism Website Application
    address                 host.docker.internal
    max_check_attempts      5
    check_period            24x7
    notification_period     24x7
    check_command           check-host-alive
    contact_groups          admins
}
define service {
    use                     generic-service
    host_name               tourism-website
    service_description     HTTP - Tourism Website
    check_command           check_http!-H host.docker.internal -p 30081 -u / -e 200,301,302
    max_check_attempts      3
    check_interval          5
    retry_interval          1
}
define service {
    use                     generic-service
    host_name               tourism-website
    service_description     HTTP - Health Check
    check_command           check_http!-H host.docker.internal -p 30081 -u /health -s UP
    max_check_attempts      3
    check_interval          5
    retry_interval          1
}
define service {
    use                     generic-service
    host_name               tourism-website
    service_description     Port 30081 Check
    check_command           check_tcp!30081
    max_check_attempts      3
    check_interval          5

    retry_interval          1
}
